name: Mirror prod → staging

on:
  schedule:
    # Weekly (was daily): even with the incremental bucket copy, each run
    # still does a full pg_dump | pg_restore over public endpoints —
    # billed egress plus a CPU/RAM/volume churn spike on staging.
    # 23:30 UTC Sunday = 05:00 IST Monday.
    - cron: '30 23 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kick mirror endpoint
        env:
          MIRROR_URL: ${{ secrets.STAGING_MIRROR_URL }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "$MIRROR_URL" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
