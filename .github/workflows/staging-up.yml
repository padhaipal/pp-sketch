name: Staging Up

# Redeploys the three staging app services (image is cached — ~1-2 min to
# live). Run this from the GitHub mobile app / Actions tab before a testing
# session. Note: while staging is down, Meta's webhooks to the staging
# WhatsApp number fail; the habit is "Staging Up first, then test".

on:
  workflow_dispatch:

permissions: {}

jobs:
  up:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
    steps:
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Redeploy staging app services
        run: |
          set -euo pipefail
          for svc in pp-sketch wabot-sketch pp-dashboard; do
            echo "--- railway redeploy: $svc"
            railway redeploy --service "$svc" --yes \
              || echo "$svc: redeploy failed (already up?) — continuing"
          done
